            - code [ref=e130]: "## Checking run status Use the status command from anywhere inside a governed repository to inspect the latest pipeline run without browsing `.sdlc/logs/` manually: ```bash bash \"$SDLC_HOME/orchestrator/status.sh\" ``` The summary reports the latest run ID, repository name, per-step outcome, elapsed time, and the log directory path. Step states are shown as: - `✓ completed`: the step finished successfully - `✗ failed`: the pipeline halted at that step - `– skipped`: the step was planned for the run but did not complete ```bash sdlc-status() { SDLC_HOME=\"${SDLC_HOME:-/path/to/sdlc}\" \\ bash \"$SDLC_HOME/orchestrator/status.sh\" } ```"
